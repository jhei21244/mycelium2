<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mycelium 2 — Dashboard</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e0e0e8;
    --dim: #6a6a7a;
    --accent: #c084fc;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
    --glow: rgba(192, 132, 252, 0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 13px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 8px;
    animation: pulse 2s ease-in-out infinite;
  }
  .status-dot.connected { background: var(--green); }
  .status-dot.disconnected { background: var(--red); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
    gap: 1px;
    background: var(--border);
    min-height: calc(100vh - 57px);
  }
  .panel {
    background: var(--surface);
    padding: 16px;
    overflow-y: auto;
  }
  .panel h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--dim);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel h2 .count {
    background: var(--border);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    color: var(--text);
  }

  /* ── Goals ── */
  .goal-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    transition: border-color 0.3s;
  }
  .goal-card.active { border-color: var(--accent); box-shadow: 0 0 20px var(--glow); }
  .goal-card.completed { border-color: var(--green); }
  .goal-card.failed { border-color: var(--red); }
  .goal-desc { font-size: 13px; margin-bottom: 8px; line-height: 1.4; }
  .goal-meta { font-size: 11px; color: var(--dim); display: flex; gap: 12px; }
  .badge {
    padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge.planning { background: #1e1b4b; color: var(--accent); }
  .badge.active { background: #1e1b4b; color: var(--accent); }
  .badge.completed { background: #052e16; color: var(--green); }
  .badge.failed { background: #2d0a0a; color: var(--red); }

  /* ── Signal Field ── */
  .signal-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .signal-bar:last-child { border-bottom: none; }
  .signal-name { flex: 1; font-size: 12px; }
  .signal-viz {
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--blue));
    transition: width 0.5s ease;
    min-width: 4px;
  }
  .signal-val { font-size: 11px; color: var(--accent); min-width: 45px; text-align: right; }

  /* ── Tasks ── */
  .task-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .task-row:last-child { border-bottom: none; }
  .task-status {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .task-status.pending { background: var(--dim); }
  .task-status.ready { background: var(--amber); animation: pulse 1.5s infinite; }
  .task-status.running { background: var(--blue); animation: pulse 0.8s infinite; }
  .task-status.done { background: var(--green); }
  .task-status.failed { background: var(--red); }
  .task-name { flex: 1; }
  .task-agent { color: var(--dim); font-size: 11px; }

  /* ── Agents ── */
  .agent-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    background: var(--bg);
    border-radius: 6px;
    margin-bottom: 6px;
    border: 1px solid var(--border);
  }
  .agent-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    background: var(--border);
  }
  .agent-avatar.working { background: #1e1b4b; }
  .agent-info { flex: 1; }
  .agent-name { font-size: 12px; font-weight: 600; }
  .agent-task { font-size: 11px; color: var(--dim); margin-top: 2px; }

  /* ── Event Log ── */
  .log-panel { grid-column: 1 / -1; max-height: 300px; }
  .log-entry {
    font-size: 11px;
    padding: 3px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }
  .log-time { color: var(--dim); min-width: 80px; }
  .log-type { min-width: 110px; font-weight: 600; }
  .log-type.goal_created { color: var(--accent); }
  .log-type.goal_active { color: var(--accent); }
  .log-type.goal_completed { color: var(--green); }
  .log-type.goal_failed { color: var(--red); }
  .log-type.task_created { color: var(--dim); }
  .log-type.task_promoted { color: var(--amber); }
  .log-type.task_claimed { color: var(--blue); }
  .log-type.task_done { color: var(--green); }
  .log-type.task_failed { color: var(--red); }
  .log-type.signal_field { color: var(--accent); }
  .log-detail { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── Submit Form ── */
  .submit-form {
    display: flex;
    gap: 8px;
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .submit-form input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }
  .submit-form input:focus { border-color: var(--accent); }
  .submit-form button {
    background: linear-gradient(135deg, var(--accent), var(--blue));
    border: none;
    border-radius: 6px;
    padding: 8px 20px;
    color: white;
    font-family: inherit;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .submit-form button:hover { opacity: 0.85; }
  .submit-form button:disabled { opacity: 0.4; cursor: not-allowed; }

  .empty { color: var(--dim); font-size: 12px; font-style: italic; padding: 20px 0; text-align: center; }
</style>
</head>
<body>
  <header>
    <h1>Mycelium 2</h1>
    <div id="conn-status"><span class="status-dot disconnected" id="ws-dot"></span><span id="ws-label">Connecting...</span></div>
  </header>

  <div class="submit-form">
    <input type="text" id="goal-input" placeholder="Describe a goal in plain English..." />
    <button id="submit-btn" onclick="submitGoal()">Submit Goal</button>
  </div>

  <div class="grid">
    <div class="panel" id="goals-panel">
      <h2>Goals <span class="count" id="goal-count">0</span></h2>
      <div id="goals-list"><div class="empty">No goals yet. Submit one above.</div></div>
    </div>

    <div class="panel" id="signal-panel">
      <h2>Signal Field <span class="count" id="signal-count">0</span></h2>
      <div id="signal-list"><div class="empty">No active signals.</div></div>
    </div>

    <div class="panel" id="agents-panel">
      <h2>Agents <span class="count" id="agent-count">0</span></h2>
      <div id="agents-list"></div>
    </div>

    <div class="panel" id="tasks-panel">
      <h2>Tasks <span class="count" id="task-count">0</span></h2>
      <div id="tasks-list"><div class="empty">No tasks yet.</div></div>
    </div>

    <div class="panel log-panel">
      <h2>Live Event Stream</h2>
      <div id="event-log"></div>
    </div>
  </div>

<script>
const state = { goals: {}, tasks: {}, agents: {}, signals: [], events: [] };
let ws;
let maxSignal = 1;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('ws-dot').className = 'status-dot connected';
    document.getElementById('ws-label').textContent = 'Live';
    loadInitialState();
  };

  ws.onclose = () => {
    document.getElementById('ws-dot').className = 'status-dot disconnected';
    document.getElementById('ws-label').textContent = 'Reconnecting...';
    setTimeout(connectWS, 2000);
  };

  ws.onmessage = (e) => {
    const event = JSON.parse(e.data);
    handleEvent(event);
  };
}

async function loadInitialState() {
  try {
    const [goals, agents, events] = await Promise.all([
      fetch('/api/goals').then(r => r.json()),
      fetch('/api/agents').then(r => r.json()),
      fetch('/api/events?limit=100').then(r => r.json()),
    ]);

    for (const g of goals) {
      state.goals[g.id] = g;
      const detail = await fetch(`/api/goals/${g.id}`).then(r => r.json());
      if (detail.tasks) {
        for (const t of detail.tasks) state.tasks[t.id] = t;
      }
    }
    for (const a of agents) state.agents[a.id] = a;
    state.events = events.reverse();

    renderAll();
  } catch (err) { console.error('Failed to load state:', err); }
}

function handleEvent(event) {
  state.events.push(event);
  if (state.events.length > 200) state.events.shift();

  switch (event.type) {
    case 'goal_created':
      state.goals[event.goal_id] = { id: event.goal_id, description: event.description, status: 'planning' };
      break;
    case 'goal_active':
      if (state.goals[event.goal_id]) state.goals[event.goal_id].status = 'active';
      refreshGoalTasks(event.goal_id);
      break;
    case 'goal_completed':
    case 'goal_failed':
      if (state.goals[event.goal_id]) state.goals[event.goal_id].status = event.type === 'goal_completed' ? 'completed' : 'failed';
      break;
    case 'task_claimed':
      if (state.tasks[event.task_id]) {
        state.tasks[event.task_id].status = 'running';
        state.tasks[event.task_id].agent_id = event.agent_id;
      }
      if (state.agents[event.agent_id]) {
        state.agents[event.agent_id].status = 'working';
        state.agents[event.agent_id]._task_name = event.task_name;
      }
      break;
    case 'task_done':
      if (state.tasks[event.task_id]) state.tasks[event.task_id].status = 'done';
      if (state.agents[event.agent_id]) {
        state.agents[event.agent_id].status = 'idle';
        state.agents[event.agent_id]._task_name = null;
      }
      break;
    case 'task_failed':
      if (state.tasks[event.task_id]) state.tasks[event.task_id].status = event.will_retry ? 'ready' : 'failed';
      if (state.agents[event.agent_id]) {
        state.agents[event.agent_id].status = 'idle';
        state.agents[event.agent_id]._task_name = null;
      }
      break;
    case 'task_promoted':
      if (state.tasks[event.task_id]) state.tasks[event.task_id].status = 'ready';
      break;
    case 'signal_field':
      state.signals = event.tasks || [];
      maxSignal = Math.max(1, ...state.signals.map(s => s.signal));
      break;
  }

  renderAll();
}

async function refreshGoalTasks(goalId) {
  try {
    const detail = await fetch(`/api/goals/${goalId}`).then(r => r.json());
    if (detail.tasks) {
      for (const t of detail.tasks) state.tasks[t.id] = t;
    }
    renderAll();
  } catch (err) {}
}

function renderAll() {
  renderGoals();
  renderSignals();
  renderAgents();
  renderTasks();
  renderEvents();
}

function renderGoals() {
  const list = document.getElementById('goals-list');
  const goals = Object.values(state.goals);
  document.getElementById('goal-count').textContent = goals.length;

  if (!goals.length) { list.innerHTML = '<div class="empty">No goals yet. Submit one above.</div>'; return; }

  list.innerHTML = goals.map(g => `
    <div class="goal-card ${g.status}">
      <div class="goal-desc">${escHtml(g.description)}</div>
      <div class="goal-meta">
        <span class="badge ${g.status}">${g.status}</span>
        <span>${g.id}</span>
      </div>
    </div>
  `).join('');
}

function renderSignals() {
  const list = document.getElementById('signal-list');
  document.getElementById('signal-count').textContent = state.signals.length;

  if (!state.signals.length) { list.innerHTML = '<div class="empty">No active signals.</div>'; return; }

  list.innerHTML = state.signals.map(s => `
    <div class="signal-bar">
      <span class="signal-name">${escHtml(s.name)}</span>
      <div style="flex:2;"><div class="signal-viz" style="width:${Math.max(5, (s.signal / maxSignal) * 100)}%"></div></div>
      <span class="signal-val">${s.signal.toFixed(2)}</span>
    </div>
  `).join('');
}

function renderAgents() {
  const list = document.getElementById('agents-list');
  const agents = Object.values(state.agents);
  document.getElementById('agent-count').textContent = agents.length;

  list.innerHTML = agents.map(a => `
    <div class="agent-card">
      <div class="agent-avatar ${a.status}">🍄</div>
      <div class="agent-info">
        <div class="agent-name">${escHtml(a.name)}</div>
        <div class="agent-task">${a.status === 'working' ? `Working: ${escHtml(a._task_name || '...')}` : 'Idle — sensing field...'}</div>
      </div>
      <span class="badge ${a.status === 'working' ? 'active' : 'completed'}">${a.status}</span>
    </div>
  `).join('');
}

function renderTasks() {
  const list = document.getElementById('tasks-list');
  const tasks = Object.values(state.tasks);
  document.getElementById('task-count').textContent = tasks.length;

  if (!tasks.length) { list.innerHTML = '<div class="empty">No tasks yet.</div>'; return; }

  const order = { running: 0, ready: 1, pending: 2, done: 3, failed: 4 };
  tasks.sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9));

  list.innerHTML = tasks.map(t => `
    <div class="task-row">
      <div class="task-status ${t.status}"></div>
      <span class="task-name">${escHtml(t.name)}</span>
      <span class="badge ${t.status === 'done' ? 'completed' : t.status === 'failed' ? 'failed' : 'active'}">${t.status}</span>
    </div>
  `).join('');
}

function renderEvents() {
  const list = document.getElementById('event-log');
  const recent = state.events.slice(-80).reverse();

  list.innerHTML = recent.map(e => {
    const type = e.type || e.event_type || '?';
    const detail = e.detail || e.description || e.result || e.error || e.task_name || '';
    const ts = e.timestamp ? new Date(e.timestamp * 1000).toLocaleTimeString() : '';
    return `<div class="log-entry">
      <span class="log-time">${ts}</span>
      <span class="log-type ${type}">${type}</span>
      <span class="log-detail">${escHtml(String(detail).slice(0, 120))}</span>
    </div>`;
  }).join('');
}

async function submitGoal() {
  const input = document.getElementById('goal-input');
  const btn = document.getElementById('submit-btn');
  const desc = input.value.trim();
  if (!desc) return;

  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    const resp = await fetch('/api/goals', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ description: desc }),
    });
    const data = await resp.json();
    input.value = '';
  } catch (err) {
    alert('Failed: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit Goal';
  }
}

document.getElementById('goal-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submitGoal();
});

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

connectWS();
</script>
</body>
</html>
